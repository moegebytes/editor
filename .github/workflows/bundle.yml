name: Tauri Bundle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: ''
          - os: windows-2022
            args: '--bundle nsis'
          - os: macos-15
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache JMdict
        id: jmdict-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/jmdict.sqlite
          key: jmdict-${{ hashFiles('resources/src/JMdict_e.xml.zst', 'tools/build-jmdict/**') }}

      - name: Build JMdict
        if: steps.jmdict-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/JMdict_e.xml.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-jmdict -- \
            ../resources/src/JMdict_e.xml ../resources/gen/

      - name: Cache KANJIDIC2
        id: kanjidic2-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/kanjidic2.sqlite
          key: kanjidic2-${{ hashFiles('resources/src/kanjidic2.xml.zst', 'tools/build-kanjidic/**') }}

      - name: Build KANJIDIC2
        if: steps.kanjidic2-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/kanjidic2.xml.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-kanjidic -- \
            ../resources/src/kanjidic2.xml ../resources/gen/

      - name: Cache Wiktionary
        id: wiktionary-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/wiktionary.sqlite
          key: wiktionary-${{ hashFiles('resources/src/wiktionary-ja_en.jsonl.zst', 'tools/build-wiktionary/**') }}

      - name: Build Wiktionary
        if: steps.wiktionary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/wiktionary-ja_en.jsonl.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-wiktionary -- \
            ../resources/src/wiktionary-ja_en.jsonl ../resources/gen/

      - name: Cache Tauri app
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Set up PNPM package manager
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Set up NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 'true'
        with:
          uploadWorkflowArtifacts: true
          tauriScript: ${{ runner.os == 'Linux' && 'cargo tauri' || 'pnpm tauri' }}
          args: ${{ matrix.args }}
