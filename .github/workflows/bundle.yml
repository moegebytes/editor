name: Tauri Bundle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: appimage,deb,rpm
            artifact: x86_64-linux
            paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - os: windows-2022
            bundles: nsis
            artifact: x86_64-windows
            paths: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-15
            bundles: dmg
            artifact: arm64-macos
            paths: src-tauri/target/release/bundle/dmg/*.dmg

    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache JMdict
        id: jmdict-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/jmdict.sqlite
          key: jmdict-${{ hashFiles('resources/src/JMdict_e.xml.zst', 'tools/build-jmdict/**') }}

      - name: Build JMdict
        if: steps.jmdict-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/JMdict_e.xml.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-jmdict -- \
            ../resources/src/JMdict_e.xml ../resources/gen/

      - name: Cache KANJIDIC2
        id: kanjidic2-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/kanjidic2.sqlite
          key: kanjidic2-${{ hashFiles('resources/src/kanjidic2.xml.zst', 'tools/build-kanjidic/**') }}

      - name: Build KANJIDIC2
        if: steps.kanjidic2-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/kanjidic2.xml.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-kanjidic -- \
            ../resources/src/kanjidic2.xml ../resources/gen/

      - name: Cache Wiktionary
        id: wiktionary-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources/gen/wiktionary.sqlite
          key: wiktionary-${{ hashFiles('resources/src/wiktionary-ja_en.jsonl.zst', 'tools/build-wiktionary/**') }}

      - name: Build Wiktionary
        if: steps.wiktionary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          zstd -d resources/src/enwiktionary-ja_en.jsonl.zst
          mkdir -p resources/gen
          cd tools && cargo run --release -p build-wiktionary -- \
            ../resources/src/enwiktionary-ja_en.jsonl ../resources/gen/

      - name: Cache Rust build
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up PNPM package manager
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Set up NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri bundle
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}-${{github.sha}}
          path: ${{ matrix.paths }}
